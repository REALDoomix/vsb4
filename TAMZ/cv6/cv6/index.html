<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
</head>
<body>
  <ion-app>

    <ion-tabs>
      <!-- Converter Tab -->
      <ion-tab tab="converter">
        <ion-header>
            <ion-toolbar>
                <ion-title>Converter</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
          <ion-item>
            <ion-label position="floating">Select Date</ion-label>
            <ion-input type="date" id="dateInput"></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="floating">Amount (CZK)</ion-label>
            <ion-input type="number" id="amountInput" value="1"></ion-input>
          </ion-item>

          <ion-item>
            <ion-label>To Currency</ion-label>
            <ion-select id="toCurrency"></ion-select>
          </ion-item>

          <ion-item>
            <ion-label>Converted Amount</ion-label>
            <ion-input id="convertedAmount" readonly></ion-input>
          </ion-item>

          <ion-card>
            <ion-card-content>
              <div id="rateDisplay">Exchange Rate: Loading...</div>
            </ion-card-content>
          </ion-card>

          <ion-button expand="block" id="refreshButton">Refresh Rates</ion-button>
        </ion-content>
      </ion-tab>

      <!--   Tab -->
      <ion-tab tab="history">
        <ion-header>
            <ion-toolbar>
                <ion-title>History graph</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
          <ion-item>
            <ion-label>Select Currency for History</ion-label>
            <ion-select id="historyCurrency"></ion-select>
          </ion-item>

          <ion-item>
            <ion-label>Compare to (Base Currency)</ion-label>
            <ion-select id="historyBaseCurrency"></ion-select>
          </ion-item>

          <ion-button expand="block" id="generateGraphBtn">Generate Graph</ion-button>

          <div style="margin-top: 20px; width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 8px; overflow: auto;">
            <canvas id="historyCanvas" width="800" height="350"></canvas>
          </div>

          <ion-card>
            <ion-card-header>
              <ion-card-title>Last 30 Days</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <p id="historyInfo">Select currencies and generate graph to see history data</p>
            </ion-card-content>
          </ion-card>
        </ion-content>
      </ion-tab>

      <!-- Tab Bar -->
      <ion-tab-bar slot="bottom" color="primary">
        <ion-tab-button tab="converter">
          <ion-icon name="swap-horizontal"></ion-icon>
          <ion-label>Converter</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="history">
          <ion-icon name="trending-up"></ion-icon>
          <ion-label>History</ion-label>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>
  </ion-app>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const apiUrl = 'http://linedu.vsb.cz/~mor03/TAMZ/cnb_json.php';
      let exchangeData = [];

      const dateInput = document.getElementById('dateInput');
      const amountInput = document.getElementById('amountInput');
      const toCurrency = document.getElementById('toCurrency');
      const convertedAmount = document.getElementById('convertedAmount');
      const refreshButton = document.getElementById('refreshButton');
      const rateDisplay = document.getElementById('rateDisplay');

      const historyCurrency = document.getElementById('historyCurrency');
      const historyBaseCurrency = document.getElementById('historyBaseCurrency');
      const generateGraphBtn = document.getElementById('generateGraphBtn');
      const canvas = document.getElementById('historyCanvas');
      const ctx = canvas.getContext('2d');
      const historyInfo = document.getElementById('historyInfo');

      function fetchExchangeRates(date = null) {
        const targetDate = date || dateInput.value || new Date().toISOString().split('T')[0];
        const url = `${apiUrl}?date=${targetDate}`;

        return fetch(url)
          .then(response => response.json())
          .then(data => {
            exchangeData = data.data || [];
            populateCurrencySelects();
            return data;
          })
          .catch(error => {
            console.error('Error fetching exchange rates:', error);
            return null;
          });
      }

      function populateCurrencySelects() {
        toCurrency.innerHTML = '';
        historyCurrency.innerHTML = '';
        historyBaseCurrency.innerHTML = '';

        exchangeData.forEach(currency => {
          const optionTo = document.createElement('ion-select-option');
          optionTo.value = currency.code;
          optionTo.textContent = `${currency.code} - ${currency.country_label} (${currency.rate})`;
          toCurrency.appendChild(optionTo);

          // History tab
          const optionHist = document.createElement('ion-select-option');
          optionHist.value = currency.code;
          optionHist.textContent = `${currency.code} - ${currency.country_label}`;
          historyCurrency.appendChild(optionHist);

          const optionBase = document.createElement('ion-select-option');
          optionBase.value = currency.code;
          optionBase.textContent = `${currency.code} - ${currency.country_label}`;
          historyBaseCurrency.appendChild(optionBase);
        });

        // Set defaults
        if (exchangeData.length > 0) {
          toCurrency.value = exchangeData[0].code;
          historyCurrency.value = exchangeData[0].code;
        }
        historyBaseCurrency.value = 'CZK';
      }

      function convertCurrency() {
        const amount = parseFloat(amountInput.value) || 0;
        const toCode = toCurrency.value;

        const toRate = exchangeData.find(c => c.code === toCode);

        if (toRate) {
          // Rate tells us how many CZK = 1 unit of foreign currency
          const rateValue = parseFloat(toRate.rate) / parseFloat(toRate.unit);
          const converted = amount / rateValue;
          
          convertedAmount.value = converted.toFixed(2);
          rateDisplay.textContent = `Exchange Rate: 1 ${toCode} = ${rateValue.toFixed(4)} CZK`;
        }
      }

      // ============ HISTORY GRAPH FUNCTIONS ============

      function generateLast30Dates() {
        const dates = [];
        const today = new Date();
        
        for (let i = 29; i >= 0; i--) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          
          // Skip weekends (Saturday = 6, Sunday = 0)
          if (date.getDay() !== 0 && date.getDay() !== 6) {
            dates.push(date.toISOString().split('T')[0]);
          }
        }
        
        return dates;
      }

      async function fetchHistoryData(dates) {
        const historyData = [];
        historyInfo.textContent = `Fetching data... (${historyData.length}/${dates.length})`;

        for (let i = 0; i < dates.length; i++) {
          try {
            const response = await fetch(`${apiUrl}?date=${dates[i]}`);
            const data = await response.json();
            historyData.push({
              date: dates[i],
              rates: data.data || []
            });

            // Update progress
            historyInfo.textContent = `Fetching data... (${i + 1}/${dates.length})`;
            
            // Small delay to avoid overwhelming the API
            await new Promise(resolve => setTimeout(resolve, 100));
          } catch (error) {
            console.error(`Error fetching data for ${dates[i]}:`, error);
          }
        }

        return historyData;
      }

      function drawGraph(historyData, currencyCode, baseCurrencyCode) {
        if (!historyData || historyData.length === 0) {
          historyInfo.textContent = 'No data available to plot';
          return;
        }

        // Extract rates for the selected currency
        const rates = [];
        const labels = [];

        historyData.forEach(dayData => {
          const currency = dayData.rates.find(c => c.code === currencyCode);
          if (currency) {
            const rate = parseFloat(currency.rate) / parseFloat(currency.unit);
            rates.push(rate);
            labels.push(dayData.date.substring(5)); // MM-DD format
          }
        });

        if (rates.length === 0) {
          historyInfo.textContent = `No data found for ${currencyCode}`;
          return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

  
        const min = Math.min(...rates);
        const max = Math.max(...rates);
        const range = max - min || 1;

     
        const padding = 40;
        const graphWidth = canvas.width - padding * 2;
        const graphHeight = canvas.height - padding * 2;

        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 10; i++) {
          const y = padding + (graphHeight / 10) * i;
          ctx.beginPath();
          ctx.moveTo(padding, y);
          ctx.lineTo(canvas.width - padding, y);
          ctx.stroke();
        }

        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, canvas.height - padding);
        ctx.lineTo(canvas.width - padding, canvas.height - padding);
        ctx.stroke();

        ctx.strokeStyle = '#007AFF';
        ctx.lineWidth = 2;
        ctx.beginPath();

        rates.forEach((rate, index) => {
          const x = padding + (graphWidth / (rates.length - 1 || 1)) * index;
          const y = canvas.height - padding - ((rate - min) / range) * graphHeight;

          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });
        
        ctx.stroke();

        ctx.fillStyle = '#007AFF';
        rates.forEach((rate, index) => {
          const x = padding + (graphWidth / (rates.length - 1 || 1)) * index;
          const y = canvas.height - padding - ((rate - min) / range) * graphHeight;
          
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, 2 * Math.PI);
          ctx.fill();
        });


        ctx.fillStyle = '#666';
        ctx.font = '11px Arial';
        ctx.textAlign = 'center';
        
        const labelStep = Math.ceil(rates.length / 8);
        labels.forEach((label, index) => {
          if (index % labelStep === 0) {
            const x = padding + (graphWidth / (rates.length - 1 || 1)) * index;
            ctx.fillText(label, x, canvas.height - 10);
          }
        });

        ctx.textAlign = 'right';
        for (let i = 0; i <= 5; i++) {
          const value = min + (range / 5) * i;
          const y = canvas.height - padding - (graphHeight / 5) * i;
          ctx.fillText(value.toFixed(2), padding - 10, y + 4);
        }

        ctx.fillStyle = '#000';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`${currencyCode} to ${baseCurrencyCode} - Last 30 Business Days`, canvas.width / 2, 25);

        historyInfo.textContent = `Showing ${rates.length} data points. Min: ${min.toFixed(4)}, Max: ${max.toFixed(4)}, Range: ${range.toFixed(4)}`;
      }

      // ============ EVENT LISTENERS ============

      dateInput.addEventListener('change', fetchExchangeRates);
      amountInput.addEventListener('input', convertCurrency);
      toCurrency.addEventListener('ionChange', convertCurrency);
      refreshButton.addEventListener('click', () => fetchExchangeRates());

      generateGraphBtn.addEventListener('click', async () => {
        const currencyCode = historyCurrency.value;
        const baseCurrencyCode = historyBaseCurrency.value;

        if (!currencyCode || !baseCurrencyCode) {
          historyInfo.textContent = 'Please select both currencies';
          return;
        }

        generateGraphBtn.disabled = true;
        generateGraphBtn.textContent = 'Loading...';

        const dates = generateLast30Dates();
        const historyData = await fetchHistoryData(dates);
        drawGraph(historyData, currencyCode, baseCurrencyCode);

        generateGraphBtn.disabled = false;
        generateGraphBtn.textContent = 'Generate Graph';
      });


      dateInput.value = new Date().toISOString().split('T')[0];
      fetchExchangeRates();
    });
  </script>
</body>
</html>
