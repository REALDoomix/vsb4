
<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI kalkulačka</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />

</head>

<body>
    <ion-app>

        <ion-tabs>
            <!-- CALCULATOR TAB -->
            <ion-tab tab="calculator">
                <ion-content style="padding-top: 5rem;">
                <ion-card>
                  <ion-card-content>
                    <ion-item>
                    <ion-input id="username" placeholder="Username" class="ion-align-self-end" ></ion-input>
                    </ion-item>
                  </ion-card-content>
                </ion-card>

                <ion-card>
                  <ion-card-content>
                    <ion-item>
                      <ion-input id="age" placeholder="Age" class="ion-align-self-end"></ion-input>
                    </ion-item>
                  </ion-card-content>
                </ion-card>

                <ion-card>
                  <ion-card-header>
                     <ion-card-title>Gender</ion-card-title>
                  </ion-card-header>
                  <ion-card-content>
                    <ion-radio-group id="gender" value="male">
                      <ion-radio value="male">Male</ion-radio><br />
                      <ion-radio value="female">Female</ion-radio><br />
                  </ion-radio-group>
                  </ion-card-content>
                </ion-card>

                <ion-card>
                  <ion-card-content>
                    <ion-range id="height" label-placement="start" label="Height (cm)" value="170" pin="true" min="100" max="250">
                      <ion-icon name="speedometer-outline" slot="start"></ion-icon>
                    </ion-range>
                    <p id="heightDisplay">height is 170 cm</p>
                    <ion-range id="weight" label-placement="start" label="Weight (kg)" value="70" pin="true" min="30" max="200">
                      <ion-icon name="speedometer-outline" slot="start"></ion-icon>
                    </ion-range>
                    <p id="weightDisplay">weight is 70 kg</p>
                  </ion-card-content>
                </ion-card>

                <ion-card>
                  <ion-card-content>
                    <ion-button expand="block" color="primary" onclick="calculateBMI()">Calculate BMI</ion-button>
                  </ion-card-content>
                </ion-card>
                </ion-content>
            </ion-tab>

            <!-- HISTORY TAB -->
            <ion-tab tab="history">
                <ion-content fullscreen="true" style="padding-top: 5rem;">
                    <ion-card>
                        <ion-card-header>
                            <ion-card-title>BMI History</ion-card-title>
                        </ion-card-header>
                        <ion-card-content>
                            <ion-list id="historyList"></ion-list>
                            <div id="noResults" style="text-align: center; padding: 2rem; color: #888;">
                                <p>No results yet. Start by calculating your BMI!</p>
                            </div>
                        </ion-card-content>
                    </ion-card>
                    <ion-card id="clearCard" style="display: none;">
                        <ion-card-content>
                            <ion-button expand="block" color="danger" onclick="clearBMIHistory()">Clear History</ion-button>
                        </ion-card-content>
                    </ion-card>
                </ion-content>
            </ion-tab>

            <!-- TAB BAR -->
            <ion-tab-bar slot="bottom">
                <ion-tab-button tab="calculator">
                    <ion-icon name="calculator"></ion-icon>
                    <ion-label>Calculator</ion-label>
                </ion-tab-button>
                <ion-tab-button tab="history">
                    <ion-icon name="list"></ion-icon>
                    <ion-label>History</ion-label>
                </ion-tab-button>
            </ion-tab-bar>
        </ion-tabs>

        <ion-action-sheet id="resultSheet" header="BMI Results"></ion-action-sheet>




    </ion-app>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('height').addEventListener('ionChange', updateHeightDisplay);
            document.getElementById('weight').addEventListener('ionChange', updateWeightDisplay);
            loadHistory();
        });

        function updateHeightDisplay() {
            const height = document.getElementById('height').value;
            document.getElementById('heightDisplay').textContent = `height is ${height} cm`;
        }

        function updateWeightDisplay() {
            const weight = document.getElementById('weight').value;
            document.getElementById('weightDisplay').textContent = `weight is ${weight} kg`;
        }

        function saveBMIResult(result) {
            let history = JSON.parse(localStorage.getItem('bmiHistory')) || [];
            
            result.timestamp = new Date().toISOString();
            
            history.push(result);
            
            localStorage.setItem('bmiHistory', JSON.stringify(history));
            
            loadHistory();
            
            console.log('Result saved to localStorage:', result);
        }

        function getBMIHistory() {
            return JSON.parse(localStorage.getItem('bmiHistory')) || [];
        }

        function loadHistory() {
            const history = getBMIHistory();
            const historyList = document.getElementById('historyList');
            const noResults = document.getElementById('noResults');
            const clearCard = document.getElementById('clearCard');
            
            historyList.innerHTML = '';
            
            if (history.length === 0) {
                noResults.style.display = 'block';
                clearCard.style.display = 'none';
                return;
            }
            
            noResults.style.display = 'none';
            clearCard.style.display = 'block';
            
            history.forEach((result, index) => {
                const date = new Date(result.timestamp).toLocaleString();
                const item = document.createElement('ion-item');
                item.innerHTML = `
                    <ion-label>
                        <h2><strong>${result.username}</strong> - BMI: ${result.bmi}</h2>
                        <p>${result.category}</p>
                        <p style="font-size: 0.85em; color: #888;">Age: ${result.age}, Height: ${result.height}cm, Weight: ${result.weight}kg | ${date}</p>
                    </ion-label>
                `;
                historyList.appendChild(item);
            });
        }

        function clearBMIHistory() {
            if (confirm('Are you sure you want to clear all history?')) {
                localStorage.removeItem('bmiHistory');
                console.log('BMI history cleared');
                loadHistory();
            }
        }

        async function calculateBMI() {
            const username = document.getElementById('username').value;
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const height = document.getElementById('height').value;
            const weight = document.getElementById('weight').value;

            if (!username || !age || !height || !weight) {
                alert('Please fill in all fields');
                return;
            }

            // BMI vypocet
            const heightMeters = height / 100;
            const bmi = (weight / (heightMeters * heightMeters)).toFixed(2);

            let category = '';
            if (bmi < 18.5) {
                category = 'Underweight';
            } else if (bmi < 25) {
                category = 'Normal Weight';
            } else if (bmi < 30) {
                category = 'Overweight';
            } else {
                category = 'Seek help';
            }

            // Ulozeni resultu
            const result = {
                username,
                age: parseInt(age),
                gender,
                height: parseInt(height),
                weight: parseInt(weight),
                bmi: parseFloat(bmi),
                category
            };

            saveBMIResult(result);

            const actionSheet = document.getElementById('resultSheet');
            actionSheet.buttons = [
                {
                    text: `User: ${username}`,
                    cssClass: 'action-disabled'
                },
                {
                    text: `Age: ${age} years`,
                    cssClass: 'action-disabled'
                },
                {
                    text: `Gender: ${gender}`,
                    cssClass: 'action-disabled'
                },
                {
                    text: `Height: ${height} cm`,
                    cssClass: 'action-disabled'
                },
                {
                    text: `Weight: ${weight} kg`,
                    cssClass: 'action-disabled'
                },
                {
                    text: `BMI: ${bmi} (${category})`,
                    cssClass: 'action-highlight'
                },
                {
                    text: 'Close',
                    role: 'cancel'
                }
            ];

            // Action sheet na vysledek
            actionSheet.present();
        }
    </script>
</body>

</html>
