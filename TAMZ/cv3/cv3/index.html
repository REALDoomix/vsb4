<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
</head>

<body>
    <ion-app>
        <ion-header>

            <ion-toolbar>
                <ion-title>Local Storage</ion-title>
            </ion-toolbar>

        </ion-header>

        <ion-content class="ion-padding">

            <ion-button id="button-list-1" onclick="showHList(50)">HTML List</ion-button>
            <ion-button id="button-list-2" onclick="showIList(50)">Ionic List</ion-button>
            <ion-button id="button-list-3" onclick="addSimpleItem()">LS add</ion-button>
            <ion-button id="button-list-4" onclick="showItems()">LS read</ion-button>

            <ul id="html-list"> </ul>
            <ion-list id="ionic-list" inset="true"> </ion-list>

        </ion-content>
    </ion-app>

    <script>

        window.addEventListener('load', function () {
            showItems();
        });

        function showHList(n) {
            console.log('showHList');
            for (let i = 0; i < n; i++) {
                let node = document.createElement("li");
                node.innerText = i.toString();
                document.getElementById("html-list").appendChild(node);
            }
        }

        function showIList(n) {
            console.log('showIList');
            for (let i = 0; i < n; i++) {
                let node = document.createElement("ion-item");
                node.setAttribute("button", "true");
                node.innerHTML = `<ion-label>${i.toString()}</ion-label>`;
                document.getElementById("ionic-list").appendChild(node);
            }
        }

        function addSimpleItem() {

            localStorage.setItem("key-1", "AAA BBB CCC DDD");
            localStorage.setItem("key-2", "BBB CCC DDD EEE");
            localStorage.setItem("key-3", "CCC DDD FFF GGG");
            console.log("localStorage.length: " + localStorage.length);

        }

        function showItems() {
            let el = document.getElementById('html-list');
            el.innerHTML = "";


            for (let i = 1; i < localStorage.length+1; i++){
              console.log(i);
              let value = localStorage.getItem(`key-${i}`);
              console.log(value);
              let node = document.createElement("li");
              node.innerText = value;
              document.getElementById("html-list").appendChild(node);
            }

            
        }

        function itemClick(id) {
            console.log("Item ID: " + id);
        }

    </script>

</body>

</html>
