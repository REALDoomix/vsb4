<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ionic Tutorial 04 - Celá Stránka</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />

</head>

<body>
    <ion-app>
        <!-- HLAVIČKA -->
        <ion-header>
            <!--
                TODO 1: Nastavte prvku ion-toolbar vlastnost "color" na hodnotu "primary"
                Dokumentace: https://ionicframework.com/docs/api/toolbar
            -->
            <ion-toolbar color="primary">
                <ion-title>Moje aplikace</ion-title>
            </ion-toolbar>
        </ion-header>

        <!--
            TODO 2: Přidejte komponentu ion-content
            - ion-content je hlavní oblast pro obsah stránky
            - Dokumentace: https://ionicframework.com/docs/api/content
        -->

       <ion-content class="ion-padding">
        <h1>This is a header!</h1>

        <ion-input id="textInput" label="Input label" label-placement="floating" fill="outline" placeholder="Input placeholder" ></ion-input>

       

        <!--
            TODO 3: Dovnitř ion-content přidejte komponentu ion-input
            - Dokumentace: https://ionicframework.com/docs/api/input
            - Vypisujte zadaný text do konzole
        -->

        


        <!--
            TODO 4: Přidejte ion-button
            - Prozkoumejte vlastnosti: expand, fill, color, shape
            - Dokumentace: https://ionicframework.com/docs/api/button
        -->

        <ion-button id="buttonActivated">Send</ion-button>

        <ion-alert
          trigger="buttonActivated"
          header="Text has been sent!"
          subheader="This is optional"

          >
        </ion-alert>

        <script>
          const alert = document.querySelector('ion-alert');
          alert.buttons = ['Ok'];

          let text = "";

          document.getElementById('buttonActivated').addEventListener('click', () => {
            const inputEl = document.getElementById('textInput');

            text = inputEl.value;

            console.log(text);
          })
        </script>


        <!--
            TODO 5: Prozkoumejte ion-alert
            - Dokumentace: https://ionicframework.com/docs/api/alert
        -->

        </ion-content>
        <!-- ZÁPATÍ -->
        <ion-footer>
            <ion-toolbar>
                <ion-title>© 2026 TAMZ</ion-title>
            </ion-toolbar>
        </ion-footer>

    </ion-app>
</body>

</html>
